name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Files (Debug Step)
        run: |
          ls -la
          ls -la app

      - name: Debug Secrets (safe check)
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "USERNAME missing"; else echo "USERNAME OK"; fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then echo "PASSWORD missing"; else echo "PASSWORD OK"; fi


      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-app:latest ./app

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-app:latest

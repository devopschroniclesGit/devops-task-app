name: Task API | Build, Push and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'chapters/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  deploy-application:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: docker.io/${{ secrets.DOCKER_USERNAME }}/task-app:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Docker Hub
        run: |
          docker logout || true
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME ./app

      - name: Push Docker image
        run: docker push $IMAGE_NAME

      - name: Validate deployment secrets
        run: |
          [ -z "${{ secrets.EC2_USER }}" ] && echo "EC2_USER missing" && exit 1
          [ -z "${{ secrets.EC2_SSH_KEY }}" ] && echo "EC2_SSH_KEY missing" && exit 1
          echo "Deployment validated"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m

          script: |
            docker network create app-network || true

            IMAGE_NAME="docker.io/${{ secrets.DOCKER_USERNAME }}/task-app:latest"

            docker rm -f postgres-db || true
            docker run -d \
              --name postgres-db \
              --network app-network \
              -e POSTGRES_USER=devuser \
              -e POSTGRES_PASSWORD=devpass \
              -e POSTGRES_DB=taskdb \
              postgres:15
            
            docker pull $IMAGE_NAME

            docker stop task-app || true
            docker rm task-app || true

            docker run -d \
              --restart unless-stopped \
              -p 80:5000 \
              --name task-app \
              --network app-network \
              -e DB_HOST=postgres-db \
              -e DB_USER=devuser \
              -e DB_PASSWORD=devpass \
              -e DB_NAME=taskdb \
              $IMAGE_NAME


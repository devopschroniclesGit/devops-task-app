name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: |
          docker logout || true
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-app:latest ./app

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-app:latest


      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/task-app:latest

            docker stop task-app || true
            docker rm task-app || true

            docker run -d \
              -p 80:5000 \
              --name task-app \
              --network app-network \
              -e DB_HOST=postgres-db \
              -e DB_USER=devuser \
              -e DB_PASSWORD=devpass \
              -e DB_NAME=taskdb \
              ${{ secrets.DOCKER_USERNAME }}/task-app:latest


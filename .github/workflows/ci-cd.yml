name: Task API | Build, Push and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'chapters/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ec2_ip }}

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Capture Elastic IP
        id: tf_output
        run: |
          echo "ec2_ip=$(terraform output -raw elastic_ip)" >> $GITHUB_OUTPUT

  deploy-application:
    needs: terraform
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: docker.io/${{ secrets.DOCKER_USERNAME }}/task-app:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Docker Hub
        run: |
          docker logout || true
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME ./app

      - name: Push Docker image
        run: docker push $IMAGE_NAME

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.ec2_ip }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            docker network create app-network || true

            IMAGE_NAME="docker.io/${{ secrets.DOCKER_USERNAME }}/task-app:latest"

            docker rm -f postgres-db || true
            docker run -d \
              --name postgres-db \
              --network app-network \
              -e POSTGRES_USER=devuser \
              -e POSTGRES_PASSWORD=devpass \
              -e POSTGRES_DB=taskdb \
              postgres:15

            docker pull $IMAGE_NAME

            docker stop task-app || true
            docker rm task-app || true

            docker run -d \
              --restart unless-stopped \
              -p 80:5000 \
              --name task-app \
              --network app-network \
              -e DB_HOST=postgres-db \
              -e DB_USER=devuser \
              -e DB_PASSWORD=devpass \
              -e DB_NAME=taskdb \
              $IMAGE_NAME

            sleep 10
            curl -f http://localhost/health

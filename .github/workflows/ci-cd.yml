name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'chapters/**'
      - '**/*.md'
  workflow_dispatch:


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env: IMAGE_NAME: docker.io/${{ secrets.DOCKER_USERNAME }}/task-app:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          docker logout || true
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME./app

      - name: Push Docker Image
        run: docker push $IMAGE_NAME      
      
      - name: Debug secret presence
        run: |
         if [ -z "${{ secrets.EC2_HOST }}" ]; then
           echo "EC2_HOST missing"
           exit 1
          else
            echo "EC2_HOST secret is present"
          fi

          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME missing"
            exit 1
          else
            echo "DOCKER_USERNAME secret is present"
          fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2 successfully"

            docker network create app-network || true
            
            docker rm -f postgres-db || true 
            docker run -d \ 
            --name postgres-db \ 
            --network app-network \ 
            -e POSTGRES_USER=devuser \ 
            -e POSTGRES_PASSWORD=devpass \ 
            -e POSTGRES_DB=taskdb \ 
            postgres:15

            docker pull $IMAGE_NAME

            docker stop task-app || true
            docker rm task-app || true


            docker run -d \
              --restart unless-stopped \
              -p 80:5000 \
              --name task-app \
              --network app-network \
              -e DB_HOST=postgres-db \
              -e DB_USER=devuser \
              -e DB_PASSWORD=devpass \
              -e DB_NAME=taskdb \
              $IMAGE_NAME
